<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSwap - Perfil</title>
  <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <h1>BookSwap</h1>
    </div>
    <nav>
      <button class="cta" onclick="redirectTo('index.html')">
        <span>Inicio</span>
        <svg width="15px" height="10px" viewBox="0 0 13 10">
          <path d="M1,5 L11,5"></path>
          <polyline points="8 1 12 5 8 9"></polyline>
        </svg>
      </button>
      <button class="cta" onclick="redirectTo('explorar.html')">
        <span>Explorar Libros</span>
        <svg width="15px" height="10px" viewBox="0 0 13 10">
          <path d="M1,5 L11,5"></path>
          <polyline points="8 1 12 5 8 9"></polyline>
        </svg>
      </button>
      <button class="cta" onclick="redirectTo('comunidad.html')">
        <span>Comunidad</span>
        <svg width="15px" height="10px" viewBox="0 0 13 10">
          <path d="M1,5 L11,5"></path>
          <polyline points="8 1 12 5 8 9"></polyline>
        </svg>
      </button>
      <button class="cta" onclick="redirectTo('blog.html')">
        <span>Blog</span>
        <svg width="15px" height="10px" viewBox="0 0 13 10">
          <path d="M1,5 L11,5"></path>
          <polyline points="8 1 12 5 8 9"></polyline>
        </svg>
      </button>
    </nav>
    <button class="cta back-btn" onclick="redirectTo('index.html')">
      <span>Volver</span>
    </button>
  </header>

  <main class="profile-content">
    <h2>Mi Perfil</h2>
    <div class="profile-details">
      <p>Nombre de Usuario: <span id="username"></span></p>
      <p>Email: <span id="email"></span></p>
      <h3>Agregar Libros</h3>
      <form id="addBookForm">
        <input type="text" id="title" placeholder="Título" required />
        <input type="text" id="author" placeholder="Autor" required />
        <input type="text" id="genre" placeholder="Género" required />
        <textarea id="description" placeholder="Descripción"></textarea>
        <input type="text" id="imageUrl" placeholder="URL de imagen" required />
        <button type="submit">Agregar Libro</button>
      </form>
    </div>

    <section class="user-books">
      <h3>Mis Libros</h3>
      <div id="book-list"></div> <!-- Aquí aparecerán los libros agregados -->
    </section>
  </main>

  <footer>
    <p>&copy; 2024 BookSwap | Contacto | Términos de Uso | Privacidad</p>
  </footer>

  <!-- Modal para editar el libro -->
  <div id="editBookModal" class="modal">
    <div class="modal-content">
      <h3>Editar Libro</h3>
      <form id="editBookForm">
        <input type="text" id="editTitle" placeholder="Título" required />
        <input type="text" id="editAuthor" placeholder="Autor" required />
        <input type="text" id="editGenre" placeholder="Género" required />
        <textarea id="editDescription" placeholder="Descripción"></textarea>
        <input type="text" id="editImageUrl" placeholder="URL de imagen" required />
        <button type="submit">Guardar Cambios</button>
        <button type="button" class="cancel" onclick="closeModal()">Cancelar</button>
      </form>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="js/libros.js"></script>
  
</body>
</html>
