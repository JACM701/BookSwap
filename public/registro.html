<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookSwap - Registro</title>
  <link rel="stylesheet" href="css/registro.css">
</head>
<body>

  <main class="register-content">
    <h2>Regístrate en BookSwap</h2>
    <form id="register-form">
      <label for="name">Nombre de usuario:</label>
      <input type="text" id="uname" name="name" placeholder="Ingresa tu nombre de usuario" required>
      
      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>
      
      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
      
      <label for="confirm-password">Confirmar contraseña:</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirma tu contraseña" required>
      
      <button type="submit">Registrarse</button>
      <p id="register-error" class="error-message"></p>
    </form>    
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>.</p>
  </main>

  <script src="js/registro.js"></script>
</body>
</html>
